name: "RISC-V 64 Release"
# Cross-compile wkg for riscv64gc-unknown-linux-gnu
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v0.15.0). Leave empty to use latest upstream release."
        required: false
        type: string
  workflow_call:
    inputs:
      tag:
        description: "Tag to build"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build riscv64 binary
    runs-on: ubuntu-latest
    steps:
      - name: Determine tag
        id: tag
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            tag=$(gh release view --repo bytecodealliance/wasm-pkg-tools --json tagName -q .tagName)
            echo "tag=$tag" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - uses: actions/checkout@v6
        with:
          ref: ${{ steps.tag.outputs.tag }}

      - name: Install Rust
        run: rustup update stable --no-self-update && rustup default stable

      - name: Install cross
        run: cargo install cross --locked

      - name: Build for riscv64
        run: cross build --release --target riscv64gc-unknown-linux-gnu

      - name: Rename binary to match upstream convention
        run: |
          mv target/riscv64gc-unknown-linux-gnu/release/wkg \
             target/riscv64gc-unknown-linux-gnu/release/wkg-riscv64gc-unknown-linux-gnu

      - name: Create or update release
        run: |
          tag="${{ steps.tag.outputs.tag }}"
          asset="target/riscv64gc-unknown-linux-gnu/release/wkg-riscv64gc-unknown-linux-gnu"
          if gh release view "$tag" > /dev/null 2>&1; then
            gh release upload --clobber "$tag" "$asset"
          else
            gh release create "$tag" "$asset" \
              --title "wkg $tag (riscv64)" \
              --notes "RISC-V 64-bit build of wkg $tag.

Built with \`cross\` targeting \`riscv64gc-unknown-linux-gnu\`.

Upstream release: https://github.com/bytecodealliance/wasm-pkg-tools/releases/tag/$tag"
          fi
        env:
          GH_TOKEN: ${{ github.token }}
